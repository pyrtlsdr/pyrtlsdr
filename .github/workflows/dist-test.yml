
name: Test Distribution

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      allow_deploy:
        description: 'Deploy with twine'
        required: true
        type: boolean

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Build dists
        run: uv build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'dists'
          path: 'dist/*'

  test:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, blacksmith-2vcpu-windows-2025 ]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

      # Note: We're exporting the lockfile without the project or its direct dependencies included.
      # Then we avoid using uv elsewhere to ensure we're testing the installed package
      # and not the development environment.
    - name: Export Lockfile
      run: uv export --frozen --only-group test --only-group doc --format requirements-txt -o requirements.txt
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: 'dists'
        path: dist
    - name: Delete source directories
      shell: bash
      run: |
        rm -Rf rtlsdr
    - name: Install wheel
      shell: bash
      run: pip install dist/*.whl
    - name: Test wheel
      shell: bash
      run: py.test tests/test_basic.py

    - name: Uninstall wheel
      shell: bash
      run: |
        pip uninstall -y pyrtlsdr
    - name: Install sdist
      shell: bash
      run: |
        pip uninstall -y pyrtlsdr
        pip install dist/*.tar.gz
    - name: Test sdist
      shell: bash
      run: py.test tests/test_basic.py

  deploy:
    needs: test
    if: ${{ success() && (github.event.inputs.allow_deploy == 'true') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel twine
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: 'dists'
          path: dist
      - name: Publish to PyPI
        if: ${{ success() && github.event.inputs.allow_deploy == 'true' }}
        env:
          TWINE_REPOSITORY: ${{ secrets.TWINE_REPOSITORY }}
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload dist/*
