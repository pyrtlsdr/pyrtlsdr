
name: Test Distribution

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      allow_deploy:
        description: 'Deploy with twine'
        required: true
        type: boolean

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
      - name: Build dists
        run: python setup.py sdist bdist_wheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'dists'
          path: 'dist/*'

  test:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [blacksmith-2vcpu-ubuntu-2404, macos-latest, blacksmith-2vcpu-windows-2025 ]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
      fail-fast: false
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -U pytest pytest-forked pytest-cov pytest-asyncio
        pip install numpy
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: 'dists'
        path: dist
    - name: Delete source directories
      shell: bash
      run: |
        rm -Rf rtlsdr
    - name: Install wheel
      shell: bash
      run: pip install dist/*.whl
    - name: Install pyrtlsdrlib
      run: pip install pyrtlsdrlib
    - name: Test wheel
      shell: bash
      run: py.test tests/test_basic.py

    - name: Uninstall wheel
      shell: bash
      run: |
        pip uninstall -y pyrtlsdr
    - name: Install sdist
      shell: bash
      run: |
        pip uninstall -y pyrtlsdr
        pip install dist/*.tar.gz
    - name: Test sdist
      shell: bash
      run: py.test tests/test_basic.py

  deploy:
    needs: test
    if: ${{ success() && (github.event.inputs.allow_deploy == 'true') }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel twine
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: 'dists'
          path: dist
      - name: Publish to PyPI
        if: ${{ success() && github.event.inputs.allow_deploy == 'true' }}
        env:
          TWINE_REPOSITORY: ${{ secrets.TWINE_REPOSITORY }}
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload dist/*
